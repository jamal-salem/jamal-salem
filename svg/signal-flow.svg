    <g fill="#06172c" stroke="#22d3ee" stroke-width="2">
      <rect x="38" y="96" width="96" height="72" rx="12"/>
      <rect x="178" y="96" width="96" height="72" rx="12"/>
      <rect x="318" y="96" width="96" height="72" rx="12"/>
      <rect x="458" y="96" width="84" height="72" rx="12"/>
      <rect x="178" y="222" width="236" height="64" rx="14" stroke="#38bdf8"/>
    </g>
    <g stroke="#22d3ee" stroke-width="4" fill="none" marker-end="url(#arrow)">
      <path d="M134 132h42"/>
      <path d="M274 132h42"/>
      <path d="M414 132h42"/>
      <path d="M500 168 C500 250 414 254 414 254"/>
      <path d="M178 254 C86 254 86 168 86 168"/>
